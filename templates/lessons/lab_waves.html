{% extends "base.html" %}
{% block content %}
<section class="lab-page" data-lab="waves">
    <header class="lab-heading">
        <a class="crumb" href="{% url 'lab_home' %}">Physics Lab</a>
        <h1>Wave Sandbox</h1>
        <p>Adjust amplitude, frequency, and speed to shape a live traveling wave.</p>
    </header>
    <div class="lab-shell">
        <canvas class="lab-canvas" id="waveCanvas"></canvas>
        <aside class="lab-controls">
            <label>Amplitude <input id="waveAmp" type="range" min="10" max="120" value="60"></label>
            <label>Frequency <input id="waveFreq" type="range" min="1" max="10" value="4"></label>
            <label>Speed <input id="waveSpeed" type="range" min="1" max="10" value="4"></label>
            <div class="lab-actions">
                <button class="btn primary" type="button" id="waveToggle">Pause</button>
                <button class="btn ghost" type="button" data-wave-preset="calm">Calm</button>
                <button class="btn ghost" type="button" data-wave-preset="pulse">Pulse</button>
            </div>
        </aside>
    </div>
</section>
{% endblock %}
